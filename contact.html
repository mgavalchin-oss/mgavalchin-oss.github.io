<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Max Gavalchin — Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Navigation -->
  <nav class="site-nav">
    <a href="index.html" class="nav-logo">MG</a>
    <ul class="nav-links">
      <li><a href="about.html" class="nav-link">About</a></li>
      <li><a href="index.html#portfolio" class="nav-link">Portfolio</a></li>
      <li><a href="contact.html" class="nav-link active">Contact</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle Navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- Header -->
  <header class="site-header">
    <h1>Contact Me</h1>
    <p1>Let's create something amazing together</p1>
  </header>

  <!-- Contact Section -->
  <section class="contact-section">
    <div class="contact-wrapper">
      <div class="contact-intro">
        <p>Have a project in mind or just want to say hi? Fill out the form below, and I'll get back to you as soon as possible.</p>
      </div>

      <form class="contact-form" action="#" method="POST">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required>

        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Your Email" required>

        <label for="message">Message</label>
        <textarea id="message" name="message" rows="6" placeholder="Your Message" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </section>

  <!-- Navigation Toggle Script -->
  <script>
    const navToggle = document.querySelector('.nav-toggle');
    const navLinks = document.querySelector('.nav-links');

    navToggle.addEventListener('click', () => {
      navLinks.classList.toggle('open');
      navToggle.classList.toggle('open');
    });

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        navLinks.classList.remove('open');
        navToggle.classList.remove('open');
      });
    });
  </script>

</body>
</html>
